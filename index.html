<!doctype html>
<html lang="ms">
  <head>
    <script>
      (function() {
        try {
          const desc = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (desc && !desc.set) {
            const originalFetch = window.fetch;
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(val) { /* ignore attempts to set fetch */ },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.error('Error polyfilling window.fetch descriptor:', e);
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  </head>

  </body>
</html>
